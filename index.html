<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社CANAE</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            overflow: hidden;
        }

        .entrance-container {
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .entrance-logo {
            max-width: 300px;
            width: 80vw;
            height: auto;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.3s;
        }

        .entrance-logo:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }

        .enter-link {
            display: block;
            margin-top: 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            letter-spacing: 5px;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .entrance-logo:hover+.enter-link {
            opacity: 1;
            letter-spacing: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="entrance-container">
        <a href="company/">
            <img src="assets/logo.png" alt="CANAE" class="entrance-logo">
        </a>
        <a href="company/" class="enter-link">Enter Site</a>
    </div>
</body>

</html>
