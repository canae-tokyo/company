<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKETEL | リアル・ダイアグノシス 運用システム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo">IKETEL</div>
        <div class="subtitle">REAL DIAGNOSIS SYSTEM</div>
    </header>

    <main class="container">
        <!-- View 1: Setup -->
        <section id="setup-view" class="view active">
            <div class="glass setup-box">
                <h2>セッション開始準備</h2>
                <p style="margin-bottom: 2rem;">会員情報を入力してダイアグノシスを開始してください。</p>

                <div class="form-group">
                    <label>会員名</label>
                    <input type="text" id="member-name" placeholder="例：山田 太郎">
                </div>

                <div class="form-group">
                    <label>年齢</label>
                    <input type="number" id="member-age" placeholder="例：30">
                </div>

                <div class="form-group">
                    <label>特記事項・事前情報</label>
                    <textarea id="member-notes" rows="3" placeholder="例：人見知り、初対面が苦手..."></textarea>
                </div>

                <button class="btn btn-primary" id="start-session">診断を開始する</button>
            </div>
        </section>

        <!-- View 2: Live Dashboard -->
        <section id="dashboard-view" class="view">
            <div class="phase-nav glass">
                <div class="phase-item active" data-phase="1">Phase 1: 待ち合わせ</div>
                <div class="phase-item" data-phase="2">Phase 2: 入店〜注文</div>
                <div class="phase-item" data-phase="3">Phase 3: メイン対話</div>
                <div class="phase-item" data-phase="4">Phase 4: 会計〜解散</div>
            </div>

            <div class="dashboard-layout">
                <!-- Left: Control & Script -->
                <div class="glass main-content">
                    <div id="phase-content">
                        <!-- Content will be injected by JS -->
                    </div>

                    <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                        <button class="btn" id="prev-phase">前のフェーズ</button>
                        <button class="btn btn-primary" id="next-phase">次のフェーズへ</button>
                        <button class="btn" id="finish-session"
                            style="margin-left: auto; border-color: #ff4b2b; color: #ff4b2b;">診断を終了する</button>
                    </div>
                </div>

                <!-- Right: Status & Quick Score -->
                <aside>
                    <div class="glass timer-container">
                        <div class="timer" id="session-timer">60:00</div>
                        <p class="subtitle">残り時間</p>
                    </div>

                    <div class="glass" style="padding: 1.5rem;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-rose);">負荷テスト実行</h4>
                        <div style="display: grid; gap: 0.5rem;">
                            <button class="btn" style="padding: 0.5rem; font-size: 0.7rem;" data-test="silence">沈黙耐性
                                (5秒)</button>
                            <button class="btn" style="padding: 0.5rem; font-size: 0.7rem;"
                                data-test="ambiguous">曖昧返答テスト</button>
                            <button class="btn" style="padding: 0.5rem; font-size: 0.7rem;"
                                data-test="unexpected">違和感提示テスト</button>
                        </div>
                    </div>

                    <div class="glass" style="padding: 1.5rem; margin-top: 1rem;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-rose);">詳細観察ポイント</h4>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>気になる口癖</label>
                            <input type="text" id="obs-phrase" placeholder="例：えーっと、あのー...">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>気になる仕草</label>
                            <input type="text" id="obs-gesture" placeholder="例：髪を触る、貧乏揺すり...">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>ネガティブポイント</label>
                            <textarea id="obs-negative" style="height: 60px;"
                                placeholder="例：声が小さすぎる、目を逸らす..."></textarea>
                        </div>
                    </div>

                    <div class="glass" style="padding: 1.5rem; margin-top: 1rem;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-rose);">クイックメモ</h4>
                        <textarea id="quick-notes" style="height: 100px; font-size: 0.8rem;"
                            placeholder="気づいた点を即座にメモ..."></textarea>
                    </div>
                </aside>
            </div>
        </section>

        <!-- View 3: Scoring & Feedback -->
        <section id="scoring-view" class="view">
            <div class="glass" style="padding: 3rem;">
                <h2 style="text-align: center; margin-bottom: 3rem;">最終評価・フィードバック</h2>

                <div class="dashboard-layout">
                    <div class="scoring-grid">
                        <h3 style="color: var(--accent-rose); margin-bottom: 1rem;">10項目評価</h3>
                        <!-- A. 第一印象 -->
                        <div class="score-item">
                            <span>A-1. 清潔感</span>
                            <div class="score-buttons" data-item="a1">
                                <button class="score-btn">1</button>
                                <button class="score-btn">2</button>
                                <button class="score-btn active">3</button>
                                <button class="score-btn">4</button>
                                <button class="score-btn">5</button>
                            </div>
                        </div>
                        <!-- ... More items will be handled by dynamic generation or listed here ... -->
                        <!-- For brevity, I'll list categories and use JS to populate or keep it lean -->
                    </div>

                    <div class="feedback-area">
                        <div id="total-score-box" class="glass"
                            style="text-align: center; padding: 2rem; margin-bottom: 2rem; border-color: var(--accent-rose);">
                            <div style="font-size: 1rem; color: var(--text-secondary);">総合スコア</div>
                            <div id="total-score" style="font-size: 4rem; font-weight: 600; color: var(--accent-rose);">
                                30<span style="font-size: 1.5rem; color: var(--text-secondary);"> / 50</span></div>
                            <div id="rank-label" style="font-size: 1.5rem; font-weight: 600;">評価：平均</div>
                        </div>

                        <button class="btn btn-primary" id="generate-feedback" style="width: 100%;">フィードバックを生成</button>
                    </div>
                </div>

                <div id="feedback-result" class="glass" style="margin-top: 3rem; padding: 2rem; display: none;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h3 style="color: var(--accent-rose); margin-bottom: 0;">生成されたフィードバック</h3>
                        <button class="btn" id="toggle-edit"
                            style="padding: 0.5rem 1.5rem; font-size: 0.7rem;">編集モード</button>
                    </div>

                    <div id="feedback-display"
                        style="white-space: pre-wrap; font-family: 'Noto Sans JP'; color: var(--text-primary); margin-bottom: 2rem; padding: 1.5rem; background: rgba(255, 255, 255, 0.4); border-radius: 12px; border: 1px solid var(--accent-pink);">
                    </div>
                    <textarea id="feedback-edit"
                        style="display: none; width: 100%; height: 400px; font-family: 'Noto Sans JP'; margin-bottom: 2rem; padding: 1rem; font-size: 1rem;"></textarea>

                    <div style="display: flex; gap: 1rem;">
                        <button class="btn" id="copy-feedback">レポートをコピー</button>
                        <button class="btn" id="restart-app">別の会員を診断する</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
